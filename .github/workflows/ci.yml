name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-app-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/web-app/package-lock.json

      - name: Install web app dependencies
        run: npm --prefix src/web-app ci

      - name: Logic drift check
        run: node scripts/check-logic-drift.mjs

      - name: Lint
        run: npm --prefix src/web-app run lint

      - name: Build
        run: npm --prefix src/web-app run build
